name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read addon version
        id: addon
        shell: bash
        run: |
          set -euo pipefail
          # The XML declaration also contains version="1.0", so only extract the addon's version attr.
          version="$(sed -n 's/.*<addon[^>]*version="\([^"]*\)".*/\1/p' addon.xml | head -1)"
          if [[ -z "${version}" ]]; then
            echo "Failed to read version from addon.xml" >&2
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Validate tag matches addon.xml version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${{ steps.addon.outputs.version }}"
          expected="v${version}"
          if [[ "${tag}" != "${expected}" ]]; then
            echo "Tag (${tag}) must match addon.xml version (${version}). Expected ${expected}." >&2
            exit 1
          fi

      - name: Build zip
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./package.sh
          ./package.sh
          ls -lah dist

      - name: Create GitHub Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
