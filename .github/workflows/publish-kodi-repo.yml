name: Publish Kodi Repository

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read addon version
        id: addon
        shell: bash
        run: |
          set -euo pipefail
          # The XML declaration also contains version="1.0", so only extract the addon's version attr.
          version="$(sed -n 's/.*<addon[^>]*version="\([^"]*\)".*/\1/p' addon.xml | head -1)"
          if [[ -z "${version}" ]]; then
            echo "Failed to read version from addon.xml" >&2
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Validate tag matches addon.xml version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${{ steps.addon.outputs.version }}"
          expected="v${version}"
          if [[ "${tag}" != "${expected}" ]]; then
            echo "Tag (${tag}) must match addon.xml version (${version}). Expected ${expected}." >&2
            exit 1
          fi

      - name: Build zip
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./package.sh
          ./package.sh
          ls -lah dist

      - name: Build Kodi repository
        shell: bash
        run: |
          set -euo pipefail
          pip install markdown
          python3 scripts/build_kodi_repo.py
          find dist/kodi-repo -maxdepth 5 -type f -print

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/kodi-repo

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
